# This rule is not used by the project kubeflare-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over cluster.kubeflare.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kubeflare-operator
    app.kubernetes.io/managed-by: kustomize
  name: cluster-cluster-admin-role
rules:
- apiGroups:
  - cluster.kubeflare.com
  resources:
  - clusters
  verbs:
  - '*'
- apiGroups:
  - cluster.kubeflare.com
  resources:
  - clusters/status
  verbs:
  - get
